<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>404 - Not Found</title>
  <link rel="icon" href="icon-light.png" type="image/png" />
  <style>
    :root {
      --color-primary: #00793d;
      --color-primary-contrast-light: #ffffff;
      --color-secondary: #4a6354;
      --color-background: #ffffff;
      --color-on-background: #1a1c19;
      --shape-corner-medium: 12px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      font-family: 'Noto Serif JP', serif;
      background: var(--color-background);
      color: var(--color-on-background);
    }

    .container {
      width: 100%;
      max-width: 640px;
      border: 2px solid var(--color-primary);
      border-radius: var(--shape-corner-medium);
      box-shadow: 0 0 12px var(--color-primary);
      background: #ffffff;
      text-align: center;
      overflow: hidden;
    }

    h1 {
      background: var(--color-primary);
      color: var(--color-primary-contrast-light);
      font-size: clamp(2.8rem, 7vw, 4.5rem);
      letter-spacing: 0.08em;
      padding: 1.25rem 1rem;
    }

    .content {
      padding: 2rem 1.5rem;
    }

    p {
      font-size: 1.2rem;
      line-height: 1.7;
      margin-bottom: 0.4rem;
    }

    .subtext {
      color: var(--color-secondary);
      font-size: 1rem;
      margin-bottom: 1.5rem;
    }

    a.back {
      display: inline-block;
      margin-top: 0.5rem;
      padding: 0.75rem 1.75rem;
      border-radius: var(--shape-corner-medium);
      background: var(--color-primary);
      color: var(--color-primary-contrast-light);
      text-decoration: none;
      font-weight: 700;
      transition: filter 0.2s ease;
    }

    a.back:hover {
      filter: brightness(1.08);
    }

    .footer {
      margin-top: 1.25rem;
      color: var(--color-secondary);
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>404</h1>
    <div class="content">
      <p>ページが見つかりません</p>
      <p class="subtext">Sorry, Not Found.</p>
      <a id="backLink" class="back" href="/">トップページへ戻る</a>
      <p class="footer">Text enlargement app</p>
    </div>
  </div>
</body>
</html>
