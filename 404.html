<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 - Not Found</title>
<link rel="icon" href="icon-light.png" type="image/png">
<link rel="icon" href="favicon.ico" sizes="any">
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap');

:root {
  --accent-color: #00793d;
  --color-primary: var(--accent-color);
  --color-primary-contrast-light: #ffffff;
  --color-secondary: #2f4a3c;
  --color-background: #ffffff;
  --color-on-background: #1a1c19;
  --shape-corner-medium: 12px;

  --selection-bg: rgba(0, 121, 61, 0.3);
  --selection-text: #ffffff;
}

* { margin:0; padding:0; box-sizing:border-box; }

::selection {
  background: var(--selection-bg);
  color: var(--selection-text);
}

body {
  background: var(--color-background);
  font-family: 'Noto Sans JP', sans-serif;
  color: var(--color-on-background);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 1rem;
}

.container {
  background: #ffffff;
  border: 2px solid var(--color-primary);
  border-radius: var(--shape-corner-medium);
  padding: 3rem 2rem;
  max-width: 640px;
  width: 100%;
  box-shadow: 0 0 12px var(--color-primary);
  text-align: center;
  position: relative;
}

h1 {
  font-family: Arial, sans-serif;
  font-size: 4rem;
  font-weight: 700;
  color: var(--color-primary);
  margin-bottom: 0.5rem;
  line-height: 1.2;
}

p.message {
  font-size: clamp(1.15rem, 2.3vw, 1.35rem);
  color: var(--color-on-background);
  margin-bottom: 2rem;
  font-weight: 700;
  line-height: 1.75;
}

p.message span {
  display: inline-block;
  margin-top: 0.25rem;
  font-size: 0.85em;
  color: var(--color-on-background);
  opacity: 0.82;
}

a.back-btn {
  display: inline-block;
  background: var(--color-primary);
  border: none;
  border-radius: var(--shape-corner-medium);
  color: var(--color-primary-contrast-light);
  font-weight: 600;
  padding: 10px 24px;
  cursor: pointer;
  font-family: 'Noto Sans JP', sans-serif;
  transition: all 0.2s ease;
  font-size: 1rem;
  text-decoration: none;
}

a.back-btn:hover {
  filter: brightness(1.08);
  transform: translateY(-1px);
  box-shadow: 0 0 10px rgba(0, 121, 61, 0.4);
}

.footer {
  font-size: 1rem;
  color: var(--color-on-background);
  margin-top: 2rem;
  border-top: 1px solid rgba(74, 99, 84, 0.25);
  padding-top: 1rem;
}

.footer a {
  color: var(--color-primary);
  text-decoration: none;
  transition: color 0.2s;
}

.footer a:hover {
  color: var(--color-on-background);
  text-decoration: underline;
}

@media (max-width: 480px) {
  .container { padding: 2rem 1.25rem; }
  h1 { font-size: 3rem; }
  p.message { line-height: 1.65; }
}
</style>
</head>
<body>

<div class="container">
  <h1>404</h1>
  <p class="message">ページが見つかりません<br><span>Sorry, Not Found.</span></p>

  <a id="backLink" class="back-btn" href="/">トップページへ戻る</a>

  <div class="footer" id="footer-copy"></div>
</div>

<script>
const ACCENT_COLOR_STORAGE_KEY = 'text-enlarger-accent-color';

const storedAccentColor = localStorage.getItem(ACCENT_COLOR_STORAGE_KEY);
if (storedAccentColor && /^#[0-9a-fA-F]{6}$/.test(storedAccentColor)) {
  document.documentElement.style.setProperty('--accent-color', storedAccentColor);
}

document.addEventListener('DOMContentLoaded', () => {
  if (location.hostname === 'hamuzon.github.io') {
    document.getElementById('backLink').href = 'https://hamuzon.github.io/text-legacy/';
  }
});

(function(){
  const baseYear = 2025;
  const currentYear = new Date().getFullYear();
  const hostname = location.hostname;
  const footer = document.getElementById('footer-copy');
  let footerHTML = '';

  let yearStr = baseYear.toString();
  if (currentYear > baseYear) {
    yearStr = `${baseYear}–${currentYear}`;
  } else if (currentYear < baseYear) {
    yearStr = `${currentYear}–${baseYear}`;
  }

  if(hostname === 'hamuzon.github.io'){
    footerHTML = `&copy; ${yearStr} <a href='https://hamuzon.github.io' target='_blank' rel='noopener noreferrer'>@hamuzon</a>`;
  } else if (hostname.includes('hamuzon-jp.f5.si')) {
    footerHTML = `&copy; ${yearStr} <a href='https://hamuzon-jp.f5.si' target='_blank' rel='noopener noreferrer'>@hamuzon</a>`;
  } else if(hostname.includes('hamusata.f5.si')){
    footerHTML = `&copy; ${yearStr} <a href='https://hamusata.f5.si' target='_blank' rel='noopener noreferrer'>@hamusata</a>`;
  } else {
    footerHTML = `&copy; ${yearStr} Text enlargement app`;
  }

  if(footer) footer.innerHTML = footerHTML;
})();
</script>

</body>
</html>
